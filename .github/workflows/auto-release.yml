name: Auto Release (patch bump on main)

on:
  push:
    branches:
      - main
    tags-ignore:
      - "**"
  # Allow promote-main-ff to trigger this via gh workflow run.
  # GITHUB_TOKEN pushes don't fire on:push, but CAN fire workflow_dispatch.
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  release:
    # Skip version-bump commits to avoid infinite loops.
    # For workflow_dispatch, head_commit is null — always run.
    if: >
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # Use default GITHUB_TOKEN — must be able to push to main & development
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine version
        id: version
        run: |
          set -euo pipefail

          current="$(node -p "require('./package.json').version")"
          echo "current=$current" >> "$GITHUB_OUTPUT"

          # Check if a tag already exists for the current version
          if git rev-parse "v${current}" >/dev/null 2>&1; then
            echo "Tag v${current} exists — bumping patch."
            npm version patch --no-git-tag-version
            new="$(node -p "require('./package.json').version")"
          else
            echo "Tag v${current} does not exist — using current version."
            new="$current"
          fi

          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "Version: $current → $new"

      - name: Commit version bump (if changed)
        run: |
          set -euo pipefail

          new="${{ steps.version.outputs.new }}"
          current="${{ steps.version.outputs.current }}"

          if [ "$new" != "$current" ]; then
            git add package.json package-lock.json 2>/dev/null || git add package.json
            git commit -m "chore(release): v${new}"
          else
            # Create a release marker commit so future merges trigger a bump
            git commit --allow-empty -m "chore(release): v${new}"
          fi

      - name: Push release commit to main
        run: git push origin main

      - name: Create and push tag
        run: |
          new="${{ steps.version.outputs.new }}"
          git tag "v${new}"
          git push origin "v${new}"

      - name: Trigger release workflow
        # GITHUB_TOKEN tag pushes don't trigger on:push workflows.
        # Use workflow_dispatch to chain to the release pipeline.
        run: |
          new="${{ steps.version.outputs.new }}"
          gh workflow run release.yml --ref "v${new}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync version to development
        # Fast-forward development to include the version bump.
        # Uses continue-on-error in case branch protection blocks it.
        continue-on-error: true
        run: |
          set -euo pipefail

          git fetch origin development
          dev_sha="$(git rev-parse origin/development)"
          main_sha="$(git rev-parse HEAD)"

          # Only FF if development is an ancestor of main (which it should be
          # right after promote-main-ff merged development into main + 1 commit)
          if git merge-base --is-ancestor "$dev_sha" "$main_sha"; then
            echo "Fast-forwarding development to main ($main_sha)"
            git push origin "$main_sha:refs/heads/development"
          else
            echo "development has diverged from main — skipping auto-sync."
            echo "Run: git checkout development && git merge main"
          fi
